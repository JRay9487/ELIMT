<!DOCTYPE html>
<html>
    <head>
        <title>YLK ELN</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>
    <body>
        <header style="margin: 1% 0px 0px 1%">
            <h2>LOGIN</h2>
        </header>
        <main style="margin: 1% 0px 0px 1%">
            <form action="/login" method="post">
                <label for="username">Account:</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                /><br /><br />
                <label for="password">Password:</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                /><br /><br />
                <input type="submit" value="login" />
                <li style="margin-top: 50px">Account : 名字拼音縮寫</li>
                <li>Account : 預設為12345</li>
            </form>
        </main>
        <footer style="position: fixed; bottom: 0px; left: 40%">
            <p>Copyright &copy; 2024 Chun-JUI, LIN.All rights reserved.</p>
        </footer>
    </body>
</html>
